<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - AgroTech Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="css/liquid-glass-system.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #F5F5F7 0%, #E8E8ED 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="glass-card p-4 p-lg-5" style="width: 100%; max-width: 440px;">
        <div class="text-center mb-4">
            <img src="images/agrotech solo negro.png" alt="AgroTech" style="height: 40px; margin-bottom: 16px;">
            <h2 class="fw-bold" style="color: var(--text-primary);">Iniciar Sesión</h2>
            <p class="text-secondary small">Accede a tu panel de monitoreo satelital</p>
        </div>

        <div id="errorBox" class="alert-badge alert-badge-danger mb-4 w-100" style="display: none;"></div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label small fw-medium text-secondary">Usuario o correo</label>
                <input type="text" id="username" class="glass-input" placeholder="tu@correo.com" required autocomplete="username">
            </div>
            <div class="mb-4">
                <label class="form-label small fw-medium text-secondary">Contraseña</label>
                <input type="password" id="password" class="glass-input" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" id="submitBtn" class="neuro-button neuro-button-primary w-100 justify-content-center py-3">
                <span id="btnText">Ingresar</span>
                <span id="btnSpinner" class="spinner-border spinner-border-sm ms-2" style="display: none;"></span>
            </button>
        </form>

        <div id="loggedInMsg" style="display:none; text-align:center;">
            <p style="color:#666;margin-bottom:16px;">✅ Ya tienes una sesión activa</p>
            <a href="templates/dashboard.html" style="display:block;text-decoration:none;background:linear-gradient(135deg,#2FB344,#1E7A2E);color:white;padding:14px;border-radius:12px;font-weight:600;margin-bottom:10px;">
                🌍 Ir al Dashboard
            </a>
            <button onclick="localStorage.clear();location.reload();" style="display:block;width:100%;background:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.5);padding:12px;border-radius:12px;font-weight:600;color:#1D1D1F;cursor:pointer;margin-top:8px;">
                🚪 Cerrar sesión (limpiar token)
            </button>
        </div>

        <p class="text-center text-secondary small mt-4">
            ¿No tienes cuenta? <a href="https://agrotechcolombia.com" class="text-decoration-none" style="color: var(--color-glass-primary);">Visita nuestro sitio</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const API_BASE = 'http://localhost:8000';
        const loginForm = document.getElementById('loginForm');
        const errorBox = document.getElementById('errorBox');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');

        // Si ya tiene token, mostrar opción de ir al dashboard o cerrar sesión
        if (localStorage.getItem('accessToken')) {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('loggedInMsg').style.display = 'block';
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            errorBox.style.display = 'none';
            btnText.style.display = 'none';
            btnSpinner.style.display = 'inline-block';
            submitBtn.disabled = true;

            try {
                const { data } = await axios.post(`${API_BASE}/api/auth/login/`, { username, password });
                
                // Guardar tokens
                localStorage.setItem('accessToken', data.tokens.access);
                localStorage.setItem('refreshToken', data.tokens.refresh);
                if (data.user) {
                    localStorage.setItem('userData', JSON.stringify(data.user));
                }

                // Redirigir
                const redirect = new URLSearchParams(window.location.search).get('next') || 'templates/dashboard.html';
                window.location.href = redirect;
            } catch (err) {
                const msg = err.response?.data?.error || err.response?.data?.detail || 'Error al iniciar sesión. Verifica tus credenciales.';
                errorBox.textContent = msg;
                errorBox.style.display = 'block';
                btnText.style.display = 'inline';
                btnSpinner.style.display = 'none';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
